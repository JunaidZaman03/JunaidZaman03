name: Generate Pac-Man Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Pac-Man SVG (dark)
        run: |
          mkdir -p dist
          npx pacman-contribution-graph --platform github --username JunaidZaman03 --gameTheme github-dark --output dist/pacman-contribution-graph-dark.svg

      - name: Generate Pac-Man SVG (light)
        run: |
          npx pacman-contribution-graph --platform github --username JunaidZaman03 --gameTheme github --output dist/pacman-contribution-graph.svg

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
